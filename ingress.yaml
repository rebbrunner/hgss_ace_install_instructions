apiVersion: apps/v1
kind: Ingress
metadata:
  name: app-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: localhost
      http:
        paths:
          # Route /api to backend (cross-namespace)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-api
                namespace: backend       # explicit namespace
                port:
                  number: 80
          # Route / to frontend (same namespace)
          # - path: /
          #   pathType: Prefix
          #   backend:
          #     service:
          #       name: frontend-service
          #       port:
          #         number: 80