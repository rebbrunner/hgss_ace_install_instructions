  README.md: |
    # HGSS/Platinum ACE Installation Guide Website

    author: Rebecca Bruner<br>
    date: 28 March 2026

    ## Description
    A website for hosting instructions on how to install HGSS and Platinum ACE exploits
  app.py: |
    from src import factory

    app = factory()

    if __name__=='__main__':
        app.run()
  compose.yaml: |
    services:
      hgss_pt_install_guide:
        image: hgss_pt_install_guide:latest
        container_name: hgss_pt_install_guide
        ports:
          - "8080:8080"
        volumes:
          - "D:/Dev/hgss_ace_install_instructions:/home/rebs/dev"
        tty: true
  pyproject.toml: |
    [project]
    name = "src"
    version = "1.0.0"
    description = "A website for hosting instructions on how to install HGSS and Platinum ACE exploits"
    dependencies = [
        "flask",
    ]

    [build-system]
    requires = ["flit_core<4"]
    build-backend = "flit_core.buildapi"
  requirements.txt: |
    blinker==1.9.0
    click==8.1.8
    colorama==0.4.6
    Flask==3.1.3
