apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: C:\ProgramData\chocolatey\lib\kubernetes-kompose\tools\kompose.exe convert
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: hgss-pt-install-guide
  name: hgss-pt-install-guide
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      io.kompose.service: hgss-pt-install-guide
  template:
    metadata:
      annotations:
        kompose.cmd: C:\ProgramData\chocolatey\lib\kubernetes-kompose\tools\kompose.exe convert
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: hgss-pt-install-guide
    spec:
      containers:
        - image: hgss_pt_install_guide:0.0.8
          name: hgss-pt-install-guide
          ports:
            - containerPort: 8080
              protocol: TCP
          tty: true
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: environment
                  key: DB_URL
      restartPolicy: Always
